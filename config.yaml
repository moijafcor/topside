thresholds:
  ram:
    warn: 70
    critical: 85
  gpu_vram:
    warn: 75
    critical: 90
  cpu:
    warn: 80
    critical: 95
  swap_proximity_buffer_pct: 8
  disk:
    warn: 80
    critical: 90

earlyoom:
  browser_warn_pct: 20      # % of total RAM at which a single browser group's RSS is considered large
  ram_pressure_floor: 70    # earlyoom EASE_IN only fires when RAM usage also exceeds this % (earlyoom won't act while memory is plentiful)

drill_cost:
  ram_delta_pct: 8
  cpu_spike_pct: 15
  gpu_vram_delta_pct: 6
  headroom_ease_in_pct: 5   # EASE_IN when projected headroom drops below this %; HOLD at < 0%

ups:
  nis_host: "forgeworkstation"   # apcupsd NIS host (TCP port 3551)
  nis_port: 3551
  load_warn: 70
  load_critical: 85
  battery_warn: 50
  battery_critical: 30

notifications:
  desktop: true
  opswire: true
  opswire_severity: WARN
  opswire_script: ~/ops/infra_notify.sh

ollama:
  base_url: "http://localhost:11434"

plugins:
  ram_monitor: true
  cpu_monitor: true
  gpu_monitor: true
  ups_monitor: true
  ollama_monitor: true
  disk_monitor: true
  demo_readiness: true
